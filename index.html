<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        /* 全局样式：铺满屏幕、无空白、背景图居中 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 本地背景图：把 background.jpg 换成你的图片路径即可 */
            background-image: url('image/1.jpg');
            background-size: cover;       /* 图片铺满屏幕 */
            background-position: center;  /* 图片居中 */
            background-repeat: no-repeat; /* 不重复 */
            min-height: 100vh;            /* 高度占满屏幕 */
            position: relative;           /* 用于定位子元素 */
            font-family: Arial, sans-serif;
        }

        /* 图片主按钮样式（替代原来的文字按钮） */
        .main-btn-img {
            position: absolute;
            bottom: 120px;    /* 上下位置：数值越大越往上，越小越往下（px） */
            left: 530px;      /* 左右位置：数值越小越往左，越大越往右（px） */
            width: 200px;     /* 按钮图片宽度，可自行修改 */
            height: auto;     /* 高度自动等比例 */
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }
        .main-btn-img:hover {
            transform: scale(1.08); /* 鼠标悬浮轻微放大 */
        }

        /* 右上角图片按钮 */
        .hidden-btn {
            position: absolute;
            top: 40px;
            right: 110px;
            width: 60px;
            height: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .hidden-btn img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hidden-btn:hover {
            transform: scale(1.1);
        }

        /* ------------- 以下是新增：图片按钮样式 ------------- */
        .video-btn {
            position: absolute;
            top: 130px;     /* 隐藏按钮下方 */
            right: 55px;
            width: 290px;   /* 按钮图片大小 */
            height: 350px;
            cursor: pointer;
            transition: 0.2s;
        }
        .video-btn:hover {
            transform: scale(1.1);
        }

        /* ------------- 以下是新增：视频弹出窗口样式 ------------- */
        .video-modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;  /* 小窗口宽度（非全屏） */
            height: auto;
            background: #ffffff;
            padding: 0px;
            border-radius: 10px;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .video-modal video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <!-- 中间偏下：图片按钮（已替换） -->
    <img src="image/3.jpg" class="main-btn-img" onclick="openMainWindow()" alt="进入">

    <!-- 右上角图片按钮（已修改） -->
    <button class="hidden-btn" onclick="openHiddenWindow()">
        <img src="image/5.jpg" alt="我不知道">
    </button>

    <!-- ------------- 以下是新增：本地图片视频按钮 ------------- -->
    <img src="image/4.png" class="video-btn" onclick="openVideoModal()" alt="视频">

    <!-- 视频弹出小窗口 -->
    <div class="video-modal" id="videoModal">
        <video id="myVideo" muted playsinline preload="auto">
            <source src="camera.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // ===================== 预留接口：新窗口跳转函数 =====================
        // 1. 主按钮新窗口（核心接口）
        function openMainWindow() {
            const mainWindowUrl = "helpfind.html"; 
            window.open(mainWindowUrl, "_blank");
        }

        // 2. 隐藏按钮新窗口（核心接口）
        function openHiddenWindow() {
            const hiddenWindowUrl = "dontknow.html";
            window.open(hiddenWindowUrl, "_blank");
        }

        // ===================== 视频弹窗功能 =====================
        const video = document.getElementById("myVideo");
        const modal = document.getElementById("videoModal");

        // 打开视频弹窗 + 自动播放
        async function openVideoModal() {
            modal.style.display = "block";
            video.currentTime = 0;
            try { await video.play(); } catch (e) {}
        }

        // 关闭视频弹窗 + 停止播放
        function closeVideoModal() {
            modal.style.display = "none";
            video.pause();
            video.currentTime = 0;
        }

        // 视频播放完毕自动关闭
        video.addEventListener("ended", closeVideoModal);

        // 点击视频窗口外部关闭
        window.addEventListener("click", function(e) {
            if (e.target === modal) {
                closeVideoModal();
            }
        });
    </script>
</body>
</html>
